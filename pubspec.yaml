name: student_event_planner
description: "A campus student committee app for event planning and AI poster generation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理 (Rubric: State Management - 20分)
  provider: ^6.1.1

  # 网络请求 (用于 Task 2 & 3 调用 AI API)
  http: ^1.2.0

  # 图标支持
  cupertino_icons: ^1.0.6

  # 如果你打算使用 Firebase Vertex AI (Task 3)
  # firebase_core: ^2.27.0
  # firebase_vertexai: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 如果你有本地图片资产，请在此处取消注释并添加
  # assets:
  #   - assets/images/logo.png